<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eier-Kochzeit-Rechner</title>
<style>
:root{--bg:#fff8ea;--card:#fffdf8;--text:#231f1a;--muted:#766b60;--line:#f0d7ad;--orange:#f7a91f;--orange2:#f28c00}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(#fffaf0,#fff4dd);color:var(--text)}.wrap{max-width:980px;margin:0 auto;padding:28px 18px 40px}.hero{text-align:center;margin-bottom:22px}.hero h1{font-size:44px;margin:0}.hero p{margin:8px 0 0;color:var(--muted);font-size:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:0 12px 30px #00000012;margin-bottom:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.field label{display:block;font-weight:800;font-size:19px;margin-bottom:8px}.field small{display:block;color:var(--muted);font-size:15px;margin-top:7px}input{width:100%;font-size:24px;padding:15px 16px;border-radius:15px;border:1px solid var(--line);background:white}.row{display:flex;gap:12px;flex-wrap:wrap}button{cursor:pointer}.choice button,.stage button,.lang button,.size button{border:1px solid var(--line);background:white;border-radius:16px;padding:16px 18px;font-size:20px;font-weight:800}.choice button.active,.stage button.active,.lang button.active,.size button.active{background:linear-gradient(#ffc85a,#f7a91f);border-color:#f28c00}.stage,.size{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:10px}.stage{grid-template-columns:repeat(3,1fr)}.stage button,.size button{min-height:76px}.calculate,.locbtn{width:100%;border:0;margin-top:22px;padding:20px;border-radius:17px;font-size:23px;font-weight:900;background:linear-gradient(90deg,#f7a91f,#f28c00)}.locbtn{background:#fff1d8;color:#231f1a;margin-top:8px}.result{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:center}.time{font-size:58px;font-weight:900;color:var(--orange2);margin:10px 0}.timerbox{text-align:center;border:1px dashed #e9c27d;border-radius:22px;padding:22px}.count{font-size:56px;font-weight:900}.controls{display:flex;justify-content:center;gap:12px;margin-top:14px}.controls button{border:0;border-radius:50px;padding:14px 18px;font-size:18px;font-weight:900;background:#fff1d8}.controls button:first-child{background:var(--orange)}.note{color:var(--muted);font-size:15px}.status{margin-top:10px;color:var(--muted);font-size:15px}@media(max-width:720px){.grid,.result{grid-template-columns:1fr}.stage,.size{grid-template-columns:1fr 1fr}.hero h1{font-size:34px}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><div class="lang row" style="justify-content:center;margin-bottom:14px"><button id="langDe" onclick="setLang('de')">Deutsch</button><button id="langEn" onclick="setLang('en')">English</button></div><h1 id="title"></h1><p id="subtitle"></p></section>
<section class="card">
<div class="field"><label id="sizeLabel"></label><div class="size"><button id="sizeS" onclick="setSize('S',53)">S<br><small>53 g</small></button><button id="sizeM" onclick="setSize('M',60)">M<br><small>60 g</small></button><button id="sizeL" onclick="setSize('L',70)">L<br><small>70 g</small></button><button id="sizeXL" onclick="setSize('XL',78)">XL<br><small>78 g</small></button></div></div>
<div class="grid" style="margin-top:22px"><div class="field"><label id="massLabel"></label><input id="mass" type="number" value="70" oninput="calculate()"><small id="massHint"></small></div><div class="field"><label id="tempLabel"></label><input id="temp" type="number" value="7" oninput="calculate()"><small id="tempHint"></small></div><div class="field"><label id="pressureLabel"></label><input id="pressure" type="number" value="1013" oninput="calculate()"><small id="pressureHint"></small></div><div class="field"><label id="heightLabel"></label><input id="height" type="number" value="0" oninput="calculate()"><small id="heightHint"></small></div><div class="field"><label id="afterLabel"></label><input id="after" type="number" value="0" oninput="calculate()"><small id="afterHint"></small></div><div class="field"><label id="shockLabel"></label><div class="choice row"><button id="shockYes" onclick="setShock(true)"></button><button id="shockNo" onclick="setShock(false)"></button></div><small id="shockHint"></small></div></div>
<button class="locbtn" id="locBtn" onclick="getLocationData()"></button><div id="status" class="status"></div>
<div class="field" style="margin-top:22px"><label id="stageLabel"></label><div class="stage"><button id="soft" onclick="setStage('soft')"></button><button id="medium" onclick="setStage('medium')"></button><button id="hard" onclick="setStage('hard')"></button></div></div><button class="calculate" id="calcBtn" onclick="calculate()"></button>
</section>
<section class="card result"><div><div id="resultHint" class="note"></div><div id="result" class="time">--:--</div><strong id="enjoy"></strong></div><div class="timerbox"><div id="countHint" class="note"></div><div id="countdown" class="count">00:00</div><div class="controls"><button id="startBtn" onclick="startTimer()">Start</button><button id="pauseBtn" onclick="pauseTimer()">Pause</button><button id="resetBtn" onclick="resetTimer()">Reset</button></div></div></section>
<section id="note" class="card note"></section>
</div>
<script>
let stage='medium',shock=true,lang='de',timerSeconds=0,remaining=0,interval=null;
const T={de:{title:'🥚 Eier-Kochzeit-Rechner',subtitle:'Die perfekte Kochzeit für dein Ei – genau berechnet.',sizeLabel:'Ei-Größe',massLabel:'Ei-Masse in g',massHint:'Kann auch manuell geändert werden.',tempLabel:'Starttemperatur in °C',tempHint:'Kühlschrank meist ca. 4–7 °C.',pressureLabel:'Luftdruck in hPa',pressureHint:'Kann automatisch ermittelt werden.',heightLabel:'Höhe über Meer in m',heightHint:'Kann automatisch geschätzt werden.',afterLabel:'Minuten bis zum Abschrecken',afterHint:'Nachgaren nach dem Herausnehmen.',shockLabel:'Abschrecken?',shockYes:'Ja',shockNo:'Nein',shockHint:'Ja = schwächeres Nachgaren.',locBtn:'📍 Standortdaten automatisch holen',stageLabel:'Garstufe',soft:'🥚 Weich',medium:'🍳 Wachsweich',hard:'🟠 Hart',calcBtn:'Berechnen',resultHint:'Empfohlene Kochzeit ab sprudelnd kochendem Wasser',enjoy:'🔥 Guten Appetit!',countHint:'Countdown',note:'💡 Hinweis: Die Ergebnisse sind Richtwerte. Größe, Frische und Herd können das Ergebnis leicht beeinflussen.',getting:'Standort wird abgefragt …',done:'Standortdaten übernommen.',denied:'Standort konnte nicht ermittelt werden.'},en:{title:'🥚 Egg Boiling Time Calculator',subtitle:'Calculate the ideal cooking time for your egg.',sizeLabel:'Egg size',massLabel:'Egg weight in g',massHint:'Can also be changed manually.',tempLabel:'Start temperature in °C',tempHint:'Fridge temperature is usually about 4–7 °C.',pressureLabel:'Air pressure in hPa',pressureHint:'Can be detected automatically.',heightLabel:'Altitude above sea level in m',heightHint:'Can be estimated automatically.',afterLabel:'Minutes until cooling',afterHint:'Carry-over cooking after removing the egg.',shockLabel:'Cool in water?',shockYes:'Yes',shockNo:'No',shockHint:'Yes = less carry-over cooking.',locBtn:'📍 Get location data automatically',stageLabel:'Doneness',soft:'🥚 Soft',medium:'🍳 Jammy',hard:'🟠 Hard',calcBtn:'Calculate',resultHint:'Recommended time from vigorously boiling water',enjoy:'🔥 Enjoy!',countHint:'Countdown',note:'💡 Note: Results are guidelines. Egg size, freshness and stove may slightly affect the result.',getting:'Requesting location …',done:'Location data applied.',denied:'Location data could not be retrieved.'}};
function setLang(l){lang=l;document.documentElement.lang=l;document.getElementById('langDe').classList.toggle('active',l==='de');document.getElementById('langEn').classList.toggle('active',l==='en');for(const k in T[l]){const el=document.getElementById(k);if(el)el.textContent=T[l][k]}document.getElementById('shockYes').textContent=T[l].shockYes;document.getElementById('shockNo').textContent=T[l].shockNo;document.getElementById('soft').textContent=T[l].soft;document.getElementById('medium').textContent=T[l].medium;document.getElementById('hard').textContent=T[l].hard}
function setSize(id,g){['S','M','L','XL'].forEach(s=>document.getElementById('size'+s).classList.remove('active'));document.getElementById('size'+id).classList.add('active');document.getElementById('mass').value=g;calculate()}
function setStage(s){stage=s;['soft','medium','hard'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById(s).classList.add('active');calculate()}
function setShock(v){shock=v;document.getElementById('shockYes').classList.toggle('active',v);document.getElementById('shockNo').classList.toggle('active',!v);calculate()}
function estimatePressure(h){return 1013.25*Math.pow(1-(0.0065*h)/288.15,5.255)}
async function getLocationData(){const status=document.getElementById('status');status.textContent=T[lang].getting;if(!navigator.geolocation){status.textContent=T[lang].denied;return}navigator.geolocation.getCurrentPosition(async pos=>{try{const lat=pos.coords.latitude,lon=pos.coords.longitude;const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=surface_pressure');const data=await r.json();if(data.elevation!==undefined)document.getElementById('height').value=Math.round(data.elevation);if(data.current&&data.current.surface_pressure!==undefined)document.getElementById('pressure').value=Math.round(data.current.surface_pressure);else document.getElementById('pressure').value=Math.round(estimatePressure(Number(document.getElementById('height').value)));status.textContent=T[lang].done;calculate()}catch(e){status.textContent=T[lang].denied}},()=>{status.textContent=T[lang].denied},{enableHighAccuracy:false,timeout:10000,maximumAge:600000})}
function calculate(){const mass=Number(document.getElementById('mass').value),temp=Number(document.getElementById('temp').value);let pressure=Number(document.getElementById('pressure').value);const height=Number(document.getElementById('height').value),after=Number(document.getElementById('after').value);if(!pressure||pressure<=0)pressure=estimatePressure(height);let base=stage==='soft'?300:stage==='hard'?600:420;let seconds=base+(mass-60)*6+(7-temp)*8+height*.04+(1013-pressure)*.5-(shock?after*6:after*20);if(seconds<60)seconds=60;timerSeconds=Math.round(seconds);remaining=timerSeconds;showTime('result',timerSeconds);showTime('countdown',remaining)}
function showTime(id,s){const m=Math.floor(s/60),sec=Math.round(s%60);document.getElementById(id).textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function startTimer(){if(remaining<=0)remaining=timerSeconds;if(interval)return;interval=setInterval(()=>{remaining--;showTime('countdown',remaining);if(remaining<=0){pauseTimer();beep();alert(lang==='de'?'Die Eier sind fertig!':'The eggs are ready!')}},1000)}function pauseTimer(){if(interval){clearInterval(interval);interval=null}}function resetTimer(){pauseTimer();remaining=timerSeconds;showTime('countdown',remaining)}
function beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=880;gain.gain.value=.2;osc.start();setTimeout(()=>{osc.stop();ctx.close()},600)}catch(e){}}
setLang('de');setSize('L',70);setShock(true);setStage('medium');calculate();
</script>
</body>
</html>
