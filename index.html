<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eier-Kochzeit-Rechner</title>
<style>
body{font-family:Arial,sans-serif;background:#fff8ea;margin:0;padding:20px;color:#222}
.wrap{max-width:760px;margin:auto}
.card{background:white;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 4px 18px #0002}
h1{margin-top:0}
label{display:block;font-weight:bold;margin-top:12px}
input,select,button{width:100%;font-size:18px;padding:12px;margin-top:5px;border-radius:10px;border:1px solid #ccc}
button{background:#f5b342;border:0;font-weight:bold;margin-top:18px}
.time{font-size:52px;font-weight:800;text-align:center;margin:10px}
.sub{text-align:center;color:#666}
</style>
</head>

<body>
<main class="wrap">
  <section class="card">
    <h1>🥚 Eier-Kochzeit-Rechner</h1>

    <label for="mass">Ei-Masse in g</label>
    <input id="mass" type="number" value="60">

    <label for="temp">Starttemperatur in °C</label>
    <input id="temp" type="number" value="7">

    <label for="pressure">Luftdruck in hPa</label>
    <input id="pressure" type="number" value="1013">

    <label for="height">Höhe über Meer in m</label>
    <input id="height" type="number" value="0">

    <label for="after">Minuten bis zum Abschrecken</label>
    <input id="after" type="number" value="0">

    <label for="shock">Abschrecken?</label>
    <select id="shock">
      <option value="yes">Ja</option>
      <option value="no">Nein</option>
    </select>

    <label for="stage">Garstufe</label>
    <select id="stage">
      <option value="soft">Weich</option>
      <option value="medium">Wachsweich</option>
      <option value="hard">Hart</option>
    </select>

    <button onclick="calculate()">Berechnen</button>
  </section>

  <section class="card">
    <div class="sub">Empfohlene Kochzeit</div>
    <div id="result" class="time">--:--</div>
  </section>
</main>

<script>
function calculate(){
  const mass = Number(document.getElementById("mass").value);
  const temp = Number(document.getElementById("temp").value);
  const pressure = Number(document.getElementById("pressure").value);
  const height = Number(document.getElementById("height").value);
  const after = Number(document.getElementById("after").value);
  const shock = document.getElementById("shock").value;
  const stage = document.getElementById("stage").value;

  let base;
  if(stage === "soft") base = 300;
  if(stage === "medium") base = 420;
  if(stage === "hard") base = 600;

  let seconds = base;

  seconds += (mass - 60) * 6;
  seconds += (7 - temp) * 8;
  seconds += height * 0.04;
  seconds += (1013 - pressure) * 0.5;

  if(shock === "no") seconds -= after * 20;

  if(seconds < 60) seconds = 60;

  const min = Math.floor(seconds / 60);
  const sec = Math.round(seconds % 60);

  document.getElementById("result").textContent =
    String(min).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}
</script>
</body>
</html>
